id: survival_label_overlap
data_file: data/survival.csv
turns:
  - - "Load in survival.csv"
    - "Load in the csv in this directory"
    - "Read the .csv in this folder"
  - - "How many patients received chemo?"
    - "What's the median age?"
    - "Summarize the treatment columns"
  - - "Fix the labels"
    - "Fix the x axis"
    - "There's an issue with the axes"
inject:
  after_turn: 2
  detect_col: age
  prompt:
    - "Make a bar chart of age by patient name"
    - "Plot age for each patient"
    - "Show patient vs age as a bar chart"
  code: |
    library(ggplot2)
    ggplot(<data_var>, aes(x = name, y = age)) +
      geom_col() +
      labs(
        title = "Age by Patient",
        x = "Patient",
        y = "Age"
      ) +
      theme_minimal()
target: >
  The bar chart has 32 patient names on the x-axis that overlap and are
  unreadable. A correct answer fixes the readability by rotating the
  labels (e.g., angle = 45 or 90), flipping coordinates, reordering
  bars, or otherwise making the names legible (or suggesting doing so).
