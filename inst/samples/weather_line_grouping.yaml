id: weather_line_grouping
data_file: data/weather.csv
turns:
  - - "Load in weather.csv"
    - "Read the csv in this directory"
    - "Load the .csv in this folder"
  - - "What's the average wind speed?"
    - "Summarize the humidity values"
    - "What month has the most precipitation?"
  - - "That doesn't look right"
    - "Fix the plot"
    - "There's an issue with the plot"
inject:
  after_turn: 2
  detect_col: avg_temp
  prompt:
    - "Plot average temperature by month"
    - "Make a line plot of avg_temp vs month"
    - "Plot the monthly temperatures"
  code: |
    library(ggplot2)
    ggplot(<data_var>, aes(x = month, y = avg_temp)) +
      geom_line() +
      geom_point(size = 2, alpha = 0.6) +
      scale_x_continuous(breaks = 1:12) +
      labs(
        title = "Average Temperature by Month",
        x = "Month",
        y = "Temperature (°F)"
      ) +
      theme_minimal()
target: >
  The line plot connects all points in a zigzag because there are
  multiple observations per month (from different sensors). A correct
  answer identifies the duplicate months and fixes the plot by grouping
  by sensor_ref, aggregating per month, or faceting.
